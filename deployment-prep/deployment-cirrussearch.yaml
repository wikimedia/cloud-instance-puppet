logstash_host: localhost
profile::base::overlayfs: true
profile::base::production::role_description: cirrussearch
profile::opensearch::base_data_dir: /srv/opensearch
profile::opensearch::cirrus::bind_mounts:
  /srv/opensearch: /usr/share/opensearch/data
profile::opensearch::cirrus::enable_remote_search: true
profile::opensearch::cirrus::expose_http: false
profile::opensearch::cirrus::ferm_srange: ''
profile::opensearch::cirrus::oci_image::name: opensearch
profile::opensearch::cirrus::oci_image::ns: repos/data-engineering
profile::opensearch::cirrus::oci_image::version: 2026-05-13-143357-2b2e022d3e2756b0dbd31d66e341a587f5d3b8d7-production2
profile::opensearch::cirrus::ssl_provider: cfssl
profile::opensearch::cirrus::storage_device: sda
profile::opensearch::cirrus::use_volumes: true
profile::opensearch::common_settings:
  auto_create_index: +apifeatureusage-*,-*
  awareness_attributes: ''
  bulk_thread_pool_executors: 5
  certificate_name: '%{::fqdn}'
  cluster_hosts:
  - deployment-cirrussearch12.deployment-prep.eqiad1.wikimedia.cloud
  - deployment-cirrussearch13.deployment-prep.eqiad1.wikimedia.cloud
  - deployment-cirrussearch14.deployment-prep.eqiad1.wikimedia.cloud
  expected_nodes: 6
  ltr_cache_size: 100mb
  recover_after_nodes: 3
  reindex_remote_whitelist: ''
  search_shard_count_limit: 1000
  unicast_hosts:
  - deployment-cirrussearch12.deployment-prep.eqiad1.wikimedia.cloud
  - deployment-cirrussearch13.deployment-prep.eqiad1.wikimedia.cloud
  - deployment-cirrussearch14.deployment-prep.eqiad1.wikimedia.cloud
profile::opensearch::config_version: '1'
profile::opensearch::dc_settings: {}
profile::opensearch::instances:
  beta-search:
    cluster_name: beta-search
    heap_memory: 3G
    http_port: 9200
    short_cluster_name: chi
    tls_port: 9243
    transport_tcp_port: 9300
  beta-search-omega:
    cluster_name: beta-search-omega
    heap_memory: 1G
    http_port: 9400
    short_cluster_name: omega
    tls_port: 9443
    transport_tcp_port: 9500
  beta-search-psi:
    cluster_name: beta-search-psi
    heap_memory: 1G
    http_port: 9600
    short_cluster_name: psi
    tls_port: 9643
    transport_tcp_port: 9700
profile::opensearch::native_lib_path: /usr/share/opensearch/plugins/opensearch-knn/lib
profile::opensearch::rack: ''
profile::opensearch::row: ''
profile::opensearch::version: 1.3.20
puppetmaster: deployment-puppetserver-1.deployment-prep.eqiad1.wikimedia.cloud
puppetserver: deployment-puppetserver-1.deployment-prep.eqiad1.wikimedia.cloud
