profile::ci::pipeline::publisher::docker_registry_password: foo
profile::ci::pipeline::publisher::docker_registry_user: ci-restricted
profile::releases::mediawiki::http_port: 8080
profile::releases::mediawiki::jenkins_agent_key: ssh-rsa test
profile::releases::mediawiki::jenkins_service_enable: mask
profile::releases::mediawiki::jenkins_service_ensure: stopped
profile::releases::mediawiki::jenkins_service_monitor: false
profile::releases::mediawiki::prefix: /
profile::releases::mediawiki::server_admin: noc@wikimedia.org
profile::releases::mediawiki::sitename: releases.wmcloud.org
profile::releases::mediawiki::sitename_jenkins: releases-jenkins.wmcloud.org
profile::tlsproxy::envoy::cfssl_options:
  hosts:
  - releases.devtools.wmnet
  - releases-jenkins.devtools.wmnet
profile::tlsproxy::envoy::global_cert_name: releases.devtools.wmnet
profile::tlsproxy::envoy::ssl_provider: cfssl
