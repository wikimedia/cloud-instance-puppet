profile::base::enable_kafka_shipping: false
profile::syslog::centralserver::file_template_property: fromhost-ip
profile::syslog::centralserver::tls_auth_mode: anon
profile::syslog::centralserver::use_kafka_relay: false
profile::syslog::remote::central_hosts_tls:
  default:
  - syslog-server06.auditlogging.eqiad1.wikimedia.cloud:6514
  - syslogaudit1.svc.eqiad1.wikimedia.cloud:6514
  - syslogaudit2.svc.eqiad1.wikimedia.cloud:6514
profile::syslog::remote::send_logs: auth-logs
profile::syslog::remote::tls_server_auth: x509/name
puppetmaster: auditlogging-puppetserver-1.auditlogging.eqiad1.wikimedia.cloud
